# Define shared file ownership vocabulary first.
# `Name.glob` binds a glob; `Name.opaque` claims a directory exclusively.
# `Name = "Expr"` combines names with |, &, and -.
[fileset]
McpToolDescriptors.glob = "src/mcp/tool/*.rs"
McpResourceDescriptors.glob = "src/mcp/resource/*.rs"
McpDescriptorTests.glob = "tests/mcp/schema_snapshot.rs"
McpTransportHandlers.glob = "src/mcp/transport/*.rs"
McpTransportTests.glob = "tests/mcp/transport.rs"
CliSurface.glob = "src/cli.rs"
CliInterfaceTests.glob = "tests/interface_integration.rs"
RuntimeOrchestrator.glob = "src/runtime/orchestrator.rs"
RuntimeWorker.glob = "src/runtime/worker.rs"
RuntimeWorkerIdentity.glob = "src/runtime/worker_id.rs"
RuntimeMailboxTests.glob = "tests/runtime_integration.rs"
SchemaFileset.glob = "src/schema/fileset/*.rs"
FilesetIntegrationTests.glob = "tests/fileset_integration.rs"
SchemaPerspective.glob = "src/schema/perspective/*.rs"
Nothing = "McpToolDescriptors - McpToolDescriptors"

# Add one table per perspective under `[perspective.<Name>]`.
# `write` names the files that perspective may modify.
# `read` names stable context files that concurrent work must not write.
[perspective]
[perspective.OpaqueDirectoryImpl]
read = "Nothing"
write = "SchemaFileset | FilesetIntegrationTests"

[perspective.McpDescriptorsRefactor]
read = "Nothing"
write = "McpToolDescriptors | McpResourceDescriptors | McpDescriptorTests"

[perspective.McpTransportRefactor]
read = "McpToolDescriptors | McpResourceDescriptors"
write = "McpTransportHandlers | McpTransportTests"

[perspective.RuntimeMailboxRefactor]
read = "Nothing"
write = "RuntimeOrchestrator | RuntimeWorker | RuntimeMailboxTests"

[perspective.NameValidationWarningRefactor]
read = "Nothing"
write = "SchemaFileset | SchemaPerspective | RuntimeWorkerIdentity | McpTransportHandlers | McpTransportTests | CliSurface | CliInterfaceTests | RuntimeMailboxTests"

# Add pre-merge gates in execution order.
# Add commands under `[check.command]` and optional skip policies under `[check.policy]`.
[check]
pipeline = []
